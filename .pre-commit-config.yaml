# 실행 순서: 자동 수정 → 체크만
# stages로 분리: commit(자동수정), manual(수동 체크)
repos:
  # ==================== STAGE: COMMIT (자동 실행) ====================
  # 1. 기본 파일 검증 및 자동 수정
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^migrations/
        types: [python]
      - id: end-of-file-fixer
        exclude: ^migrations/
        types: [python]
      - id: check-yaml
        args: ["--unsafe"]  # allow custom YAML tags
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements
        exclude: ^migrations/
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # 2. Ruff: 린팅 + 포맷팅 (pyupgrade, autoflake, isort, Black, flake8, bandit 통합)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      # Ruff linter (check + fix): replaces flake8, pyupgrade, autoflake, isort, bandit
      - id: ruff-check
        args: [--fix]
        exclude: ^migrations/
      # Ruff formatter: replaces Black
      - id: ruff-format
        exclude: ^migrations/

  # ==================== STAGE: MANUAL (수동 실행) ====================
  # 타입 체킹: pre-commit run --hook-stage manual mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        stages: [manual]
        exclude: ^(migrations/|tests/|.*test\.py$|run_.*\.py$|force_.*\.py$)
        args:
          - --ignore-missing-imports
          - --check-untyped-defs  # disallow에서 완화
          - --warn-redundant-casts
          - --no-implicit-optional
        additional_dependencies:
          - types-requests
          - pydantic

  # ==================== STAGE: COMMIT (아키텍처 위반 검사) ====================
  - repo: local
    hooks:
      # Domain 레이어에서 Infrastructure import 금지
      - id: no-domain-infra-import
        name: "Domain → Infrastructure import 금지"
        language: pygrep
        entry: "from src\\..*\\.infrastructure"
        files: "src/.*/domain/.*\\.py$"

      # Entity 패턴 잔존 검출 (ADR 004: DTO로 통일)
      - id: no-entity-pattern
        name: "Entity 패턴 미사용 (DTO로 통일)"
        language: pygrep
        entry: "\\.to_entity\\(|\\.from_entity\\(|from src\\._core\\.domain\\.entities"
        files: "\\.py$"
